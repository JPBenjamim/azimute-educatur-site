<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230D2246'/%3E%3Ctext x='50' y='70' font-size='60' font-family='Arial,sans-serif' font-weight='900' fill='%23DF6951' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E">
  <title>Página não encontrada | Azimute Educatur</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root { --dark:#0D2246; --black:#1a1a1a; --white:#fff; --off:#f4f4f4; --line:#e2e2e2; --gray:#686a70; --accent:#DF6951; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Fira Sans', -apple-system, BlinkMacSystemFont, sans-serif; color: var(--black); background: var(--white); -webkit-font-smoothing: antialiased; }
    .wrap { max-width: 640px; margin: 0 auto; padding: 0 24px; }
    .err { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    .err-num { font-size: clamp(3.5rem, 14vw, 7rem); font-weight: 900; letter-spacing: -.04em; color: var(--dark); line-height: 1; }
    .err-h { font-size: clamp(1.3rem, 3.5vw, 1.8rem); font-weight: 800; letter-spacing: -.02em; margin: 16px 0 12px; color: var(--black); }
    .err-p { font-size: 15px; color: var(--gray); line-height: 1.6; font-weight: 500; margin-bottom: 32px; }
    .err-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; min-height: 46px; padding: 0 24px; border-radius: 999px; font-weight: 800; font-size: 14px; text-decoration: none; }
    .btn-accent { background: var(--accent); color: var(--white); }
    .btn-dark { background: var(--dark); color: var(--white); }
    .logo { position: absolute; top: 28px; left: 28px; text-decoration: none; line-height: 1.05; display: grid; }
    .logo-name { font-weight: 900; font-size: 15px; letter-spacing: -.02em; color: var(--dark); }
    .logo-sub { color: var(--accent); font-size: 8px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; }
  </style>
</head>
<body>
  <a class="logo" href="index.html"><span class="logo-name">Azimute Educatur</span><span class="logo-sub">Expedições Pedagógicas</span></a>
  <div class="err wrap">
    <div class="err-num">404</div>
    <h1 class="err-h">Essa página não existe.</h1>
    <p class="err-p">O link pode ter mudado ou o roteiro que você procura ainda está em desenvolvimento. Veja o catálogo completo ou volte para o início.</p>
    <div class="err-actions">
      <a class="btn btn-accent" href="catalogo.html">Ver catálogo de roteiros</a>
      <a class="btn btn-dark" href="index.html">Voltar ao início</a>
    </div>
  </div>
</body>
</html>
